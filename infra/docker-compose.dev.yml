version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    volumes:
      - ../:/workspace
    command: >
      sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-slim
    working_dir: /workspace/frontend
    volumes:
      - ../:/workspace
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
